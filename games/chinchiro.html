<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>チンチロリン - Mocchi Casino</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .chinchiro-table {
            background: #2b4f2b; /* ギャンブルマット風の緑 */
            border: 5px solid #1a1a1a;
            border-radius: 10px;
            padding: 20px;
            margin: 20px auto;
            max-width: 500px;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
        }

        .bowl {
            background: #d8c3a5; /* どんぶり風の色 */
            border-radius: 50%;
            height: 120px;
            width: 80%;
            margin: 10px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            box-shadow: inset 0 -10px 20px rgba(0,0,0,0.5), 0 5px 15px rgba(0,0,0,0.5);
            border: 3px solid #8e735b;
        }

        .dice {
            font-size: 3rem;
            color: #fff;
            text-shadow: 2px 2px 4px #000;
        }

        .dice-red { color: #ff4d4d; } /* 1の目だけ赤くするためのクラス */

        .turn-box {
            text-align: center;
            margin-bottom: 20px;
            padding: 10px;
            background: rgba(0,0,0,0.4);
            border-radius: 8px;
        }

        .hand-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: #FFD700;
            min-height: 1.5em;
        }

        .status-text {
            font-size: 1.2rem;
            text-align: center;
            margin: 15px 0;
            min-height: 2em;
            color: var(--text-main);
        }

        .history {
            font-size: 0.8rem;
            color: #aaa;
            min-height: 1.5em;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="form-container" style="max-width: 600px;">
        <h2>🎲 CHINCHIRO (VS CPU)</h2>

        <div style="text-align: center; margin-bottom: 15px;">
            所持金: <span id="display-money" style="color: var(--accent-main); font-weight: bold; font-size: 1.4rem;">--- M</span>
        </div>

        <div class="chinchiro-table">
            <div class="turn-box">
                <div style="color:#ff6b6b; font-weight:bold;">🤖 CPUのターン</div>
                <div class="bowl" id="cpu-bowl">
                    <span class="dice">❓</span><span class="dice">❓</span><span class="dice">❓</span>
                </div>
                <div id="cpu-hand" class="hand-name"></div>
                <div id="cpu-history" class="history"></div>
            </div>

            <div class="turn-box">
                <div style="color:#4dabf7; font-weight:bold;">👤 あなたのターン</div>
                <div class="bowl" id="player-bowl">
                    <span class="dice">❓</span><span class="dice">❓</span><span class="dice">❓</span>
                </div>
                <div id="player-hand" class="hand-name"></div>
                <div id="player-history" class="history"></div>
            </div>
        </div>

        <label for="bet-input">賭け金 / BET AMOUNT</label>
        <input type="number" id="bet-input" min="1" placeholder="全額BETも可能...！" required>

        <button type="button" id="play-btn" onclick="playChinchiro()" style="margin-top: 15px; font-size: 1.2rem; padding: 15px;">勝負！！</button>

        <div id="result-text" class="status-text"></div>

        <button onclick="location.href='./index.html'" style="margin-top: 20px; border-color: #888; color: #888; padding: 8px;">◀ ゲーム一覧に戻る</button>
    </div>

    <script>
        const BACKEND_URL = "https://mcci-backend-service.onrender.com";
        let currentMoney = 0;
        
        // Unicodeのサイコロ文字
        const diceChars = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];

        window.onload = async function() {
            const username = localStorage.getItem('mcci_username');
            if (!username) { window.location.href = "../login/index.html"; return; }
            await updateStatus();
        };

        async function updateStatus() {
            const username = localStorage.getItem('mcci_username');
            try {
                const response = await fetch(`${BACKEND_URL}/api/user-info?username=${encodeURIComponent(username)}`);
                const result = await response.json();
                if (result.success) {
                    currentMoney = result.money;
                    document.getElementById('display-money').innerText = currentMoney + " M";
                    document.getElementById('bet-input').max = currentMoney;
                }
            } catch (e) { console.error(e); }
        }

        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        function renderDice(bowlId, diceArray) {
            const bowl = document.getElementById(bowlId);
            bowl.innerHTML = "";
            diceArray.forEach(num => {
                const span = document.createElement('span');
                span.className = num === 1 ? 'dice dice-red' : 'dice';
                span.innerText = diceChars[num - 1];
                bowl.appendChild(span);
            });
        }

        function resetBoard() {
            document.getElementById('cpu-bowl').innerHTML = '<span class="dice">❓</span><span class="dice">❓</span><span class="dice">❓</span>';
            document.getElementById('player-bowl').innerHTML = '<span class="dice">❓</span><span class="dice">❓</span><span class="dice">❓</span>';
            document.getElementById('cpu-hand').innerText = '';
            document.getElementById('player-hand').innerText = '';
            document.getElementById('cpu-history').innerText = '';
            document.getElementById('player-history').innerText = '';
            document.getElementById('result-text').innerText = '';
        }

        async function animateTurn(target, turnData) {
            const historyEl = document.getElementById(`${target}-history`);
            const handEl = document.getElementById(`${target}-hand`);
            const bowlId = `${target}-bowl`;

            let historyText = [];

            for (let i = 0; i < turnData.rolls.length; i++) {
                const roll = turnData.rolls[i];
                document.getElementById('result-text').innerText = `${target === 'cpu' ? 'CPU' : 'あなた'}がサイコロを振っています...(${i+1}回目)`;
                
                // ガラガラと振っているフェイクアニメーション
                for(let j=0; j<5; j++) {
                    renderDice(bowlId, [Math.floor(Math.random()*6)+1, Math.floor(Math.random()*6)+1, Math.floor(Math.random()*6)+1]);
                    await sleep(100);
                }
                
                // 確定した目を表示
                renderDice(bowlId, roll.dice);
                handEl.innerText = roll.hand.name;
                historyText.push(`${i+1}回目:[${roll.dice.join(',')}]`);
                historyEl.innerText = "履歴: " + historyText.join(" → ");

                await sleep(1000); // 結果を見せるために待つ
            }
        }

        async function playChinchiro() {
            const username = localStorage.getItem('mcci_username');
            const betInput = document.getElementById('bet-input');
            const bet = parseInt(betInput.value);
            const playBtn = document.getElementById('play-btn');

            if (isNaN(bet) || bet < 1) { alert("正しい賭け金を入力してください。"); return; }
            if (bet > currentMoney) { alert("所持金が足りません！"); return; }

            playBtn.disabled = true;
            resetBoard();

            // 財布から賭け金を引く演出
            document.getElementById('display-money').innerText = (currentMoney - bet) + " M";

            try {
                // サーバーから「勝負の台本」を一括取得
                const response = await fetch(`${BACKEND_URL}/api/games/chinchiro`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, bet })
                });
                const result = await response.json();

                if (result.success) {
                    // 台本に沿ってアニメーション再生
                    await animateTurn('cpu', result.cpuTurn);
                    await sleep(500);
                    await animateTurn('player', result.playerTurn);

                    // 最終結果発表
                    const resText = document.getElementById('result-text');
                    resText.innerText = result.message;
                    if (result.result === 'win') resText.style.color = "var(--accent-main)";
                    else if (result.result === 'lose') resText.style.color = "var(--alert-red)";
                    else resText.style.color = "#FFD700";

                    // 最新の所持金に更新
                    await updateStatus();
                } else {
                    alert(result.message);
                    await updateStatus();
                }
            } catch (error) {
                alert("通信エラーが発生しました。");
                await updateStatus();
            } finally {
                playBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
