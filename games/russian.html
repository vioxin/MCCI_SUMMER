<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ロシアンルーレット - Mocchi Casino</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .cylinder-wrapper {
            width: 140px;
            height: 140px;
            margin: 20px auto;
            border-radius: 50%;
            border: 4px solid var(--accent-main);
            box-shadow: 0 0 20px var(--accent-main);
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111;
            font-size: 3rem;
        }
        .cylinder-wrapper.spinning { animation: cyl-spin 0.3s linear infinite; }
        @keyframes cyl-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .bullet-row { display: flex; gap: 8px; justify-content: center; margin: 15px 0; }
        .bullet-btn {
            width: 46px; height: 46px;
            border-radius: 50%;
            border: 1px solid var(--accent-sub);
            background: rgba(0,0,0,0.5);
            color: var(--text-main);
            font-family: 'Share Tech Mono', monospace;
            font-size: 1rem;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .bullet-btn.selected {
            background: var(--alert-red);
            border-color: var(--alert-red);
            color: #000;
            box-shadow: 0 0 10px var(--alert-red);
            font-weight: bold;
        }
        .mult-note { text-align: center; font-size: 0.8rem; color: var(--accent-sub); min-height: 18px; margin-bottom: 10px; }

        .result-display {
            font-size: 1.3rem;
            font-weight: bold;
            text-align: center;
            margin: 15px 0;
            min-height: 50px;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="form-container" style="max-width: 480px;">
        <h2>🔫 ロシアンルーレット</h2>

        <div style="text-align: center; margin-bottom: 10px;">
            所持金: <span id="display-money" style="color: var(--accent-main); font-weight: bold; font-size: 1.4rem;">--- M</span>
        </div>
        <div style="text-align: center; font-size: 0.85rem; color: var(--accent-sub); margin-bottom: 10px;">
            現在の賭け金制限：<span id="bet-range">下限 ---M / 上限 ---M</span>
        </div>

        <div class="cylinder-wrapper" id="cylinder">🔫</div>

        <label for="bet-input">賭け金 / BET AMOUNT</label>
        <input type="number" id="bet-input" min="1" placeholder="金額を入力" required>

        <label>弾を何発込めるか / BULLETS (多いほどハイリスク・ハイリターン)</label>
        <div class="bullet-row">
            <button type="button" class="bullet-btn" data-b="1" onclick="selectBullets(1)">1</button>
            <button type="button" class="bullet-btn" data-b="2" onclick="selectBullets(2)">2</button>
            <button type="button" class="bullet-btn" data-b="3" onclick="selectBullets(3)">3</button>
            <button type="button" class="bullet-btn" data-b="4" onclick="selectBullets(4)">4</button>
            <button type="button" class="bullet-btn" data-b="5" onclick="selectBullets(5)">5</button>
        </div>
        <div class="mult-note" id="mult-note"></div>

        <button type="button" id="play-btn" onclick="playRussian()" style="margin-top: 10px;">引き金を引く！ / PULL TRIGGER</button>

        <div id="result-text" class="result-display"></div>

        <button onclick="location.href='./index.html'" style="margin-top: 10px; border-color: #888; color: #888; padding: 8px;">◀ ゲーム一覧に戻る</button>
    </div>

    <script>
        const BACKEND_URL = "https://mcci-backend-service.onrender.com";
        const MULT_TABLE = { 1: 1.2, 2: 1.5, 3: 2, 4: 3, 5: 6 };
        let currentMoney = 0;
        let selectedBullets = null;

        window.onload = async function() {
            const username = localStorage.getItem('mcci_username');
            if (!username) { window.location.href = "../login/index.html"; return; }
            await updateStatus();
        };

        function selectBullets(n) {
            selectedBullets = n;
            document.querySelectorAll('.bullet-btn').forEach(btn => {
                btn.classList.toggle('selected', parseInt(btn.dataset.b) === n);
            });
            const shotChance = Math.round((n / 6) * 100);
            document.getElementById('mult-note').innerText = `撃たれる確率: 6分の${n}(約${shotChance}%) / 生存時配当: ${MULT_TABLE[n]}倍`;
        }

        async function updateStatus() {
            const username = localStorage.getItem('mcci_username');
            try {
                const response = await fetch(`${BACKEND_URL}/api/user-info?username=${encodeURIComponent(username)}`);
                const result = await response.json();
                if (result.success) {
                    currentMoney = result.money;
                    document.getElementById('display-money').innerText = currentMoney + " M";

                    const minBet = Math.max(1, Math.floor(currentMoney * 0.05));
                    const maxBet = Math.max(1, Math.floor(currentMoney * 0.30));
                    document.getElementById('bet-range').innerText = `下限 ${minBet}M 〜 上限 ${maxBet}M`;

                    const betInput = document.getElementById('bet-input');
                    betInput.min = minBet;
                    betInput.max = maxBet;
                }
            } catch (e) { console.error(e); }
        }

        async function playRussian() {
            const username = localStorage.getItem('mcci_username');
            const betInput = document.getElementById('bet-input');
            const bet = parseInt(betInput.value);
            const resultText = document.getElementById('result-text');
            const playBtn = document.getElementById('play-btn');
            const cylinder = document.getElementById('cylinder');

            if (isNaN(bet)) { alert("賭け金を数値で入力してください。"); return; }
            if (!selectedBullets) { alert("弾数を選択してください。"); return; }

            const minBet = Math.max(1, Math.floor(currentMoney * 0.05));
            const maxBet = Math.max(1, Math.floor(currentMoney * 0.30));
            if (bet < minBet || bet > maxBet) {
                alert(`賭け金は ${minBet}M から ${maxBet}M の間で指定してください。`);
                return;
            }

            resultText.innerText = "弾倉を回転させています... 🔄";
            resultText.style.color = "var(--text-main)";
            playBtn.disabled = true;
            cylinder.classList.add('spinning');
            document.getElementById('display-money').innerText = (currentMoney - bet) + " M";

            try {
                const response = await fetch(`${BACKEND_URL}/api/games/russian`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, bet, bullets: selectedBullets })
                });
                const result = await response.json();

                setTimeout(async () => {
                    cylinder.classList.remove('spinning');

                    if (result.success) {
                        cylinder.innerText = result.shot ? '💥' : '😮\u200d💨';
                        resultText.innerText = result.message;
                        resultText.style.color = result.shot ? "var(--alert-red)" : "var(--accent-main)";

                        await updateStatus();
                        betInput.value = "";
                    } else {
                        alert(result.message);
                        resultText.innerText = "";
                        cylinder.innerText = "🔫";
                        await updateStatus();
                    }
                    playBtn.disabled = false;
                }, 2000);

            } catch (error) {
                alert("通信エラーが発生しました。");
                resultText.innerText = "";
                cylinder.classList.remove('spinning');
                cylinder.innerText = "🔫";
                playBtn.disabled = false;
                await updateStatus();
            }
        }
    </script>
</body>
</html>
