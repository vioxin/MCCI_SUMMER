<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>コイントス - Mocchi Casino</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .choice-group {
            display: flex;
            gap: 20px;
            margin: 20px 0;
        }
        .choice-btn {
            flex: 1;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--accent-sub);
            color: var(--text-main);
            padding: 15px;
            font-size: 1.1rem;
            cursor: pointer;
        }
        .choice-btn.selected {
            background: var(--accent-main);
            color: #000;
            box-shadow: 0 0 10px var(--accent-main);
            font-weight: bold;
        }
        .result-display {
            font-size: 1.4rem;
            font-weight: bold;
            text-align: center;
            margin: 20px 0;
            min-height: 50px;
            line-height: 1.4;
        }

        /* 🪙 コインのアニメーション関連スタイル */
        .coin-wrapper {
            perspective: 1000px;
            width: 120px;
            height: 120px;
            margin: 30px auto;
        }
        .coin {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 3s cubic-bezier(0.2, 0.8, 0.3, 1);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .coin-face {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            border: 4px solid var(--accent-main);
            box-shadow: 0 0 15px var(--accent-main);
        }
        .coin-front {
            background: #111;
            color: var(--accent-main);
        }
        .coin-back {
            background: #111;
            color: var(--alert-red);
            border-color: var(--alert-red);
            box-shadow: 0 0 15px var(--alert-red);
            transform: rotateY(180deg);
        }

        /* 回転中のアニメーション定義 */
        @keyframes spin {
            0% { transform: rotateY(0deg) rotateX(0deg); }
            100% { transform: rotateY(1800deg) rotateX(360deg); }
        }
        .coin.spinning {
            animation: spin 0.2s linear infinite;
        }
    </style>
</head>
<body>
    <div class="form-container" style="max-width: 500px;">
        <h2>🪙 COIN TOSS</h2>

        <div style="text-align: center; margin-bottom: 15px;">
            所持金: <span id="display-money" style="color: var(--accent-main); font-weight: bold; font-size: 1.4rem;">--- M</span>
        </div>

        <div style="text-align: center; font-size: 0.85rem; color: var(--accent-sub); margin-bottom: 10px;">
            現在の賭け金制限：<span id="bet-range">下限 ---M / 上限 ---M</span>
        </div>

        <div class="coin-wrapper">
            <div id="coin" class="coin">
                <div class="coin-face coin-front">表</div>
                <div class="coin-face coin-back">裏</div>
            </div>
        </div>

        <label for="bet-input">賭け金 / BET AMOUNT (1M単位)</label>
        <input type="number" id="bet-input" min="1" placeholder="金額を入力" required>

        <label>賭ける面を選択 / CHOOSE SIDE</label>
        <div class="choice-group">
            <button type="button" id="btn-heads" class="choice-btn" onclick="selectSide('heads')">🔵 表 / HEADS</button>
            <button type="button" id="btn-tails" class="choice-btn" onclick="selectSide('tails')">🔴 裏 / TAILS</button>
        </div>

        <button type="button" id="play-btn" onclick="playCoinToss()" style="margin-top: 10px;">コインを投げる！ / FLIP</button>

        <div id="result-text" class="result-display"></div>

        <button onclick="location.href='./index.html'" style="margin-top: 20px; border-color: #888; color: #888; padding: 8px;">◀ ゲーム一覧に戻る</button>
    </div>

    <script>
        const BACKEND_URL = "https://mcci-backend-service.onrender.com";
        let selectedSide = null;
        let currentMoney = 0;

        window.onload = async function() {
            const username = localStorage.getItem('mcci_username');
            if (!username) { window.location.href = "../login/index.html"; return; }
            await updateStatus();
        };

        function selectSide(side) {
            selectedSide = side;
            document.getElementById('btn-heads').classList.remove('selected');
            document.getElementById('btn-tails').classList.remove('selected');
            if (side === 'heads') document.getElementById('btn-heads').classList.add('selected');
            if (side === 'tails') document.getElementById('btn-tails').classList.add('selected');
        }

        async function updateStatus() {
            const username = localStorage.getItem('mcci_username');
            try {
                const response = await fetch(`${BACKEND_URL}/api/user-info?username=${encodeURIComponent(username)}`);
                const result = await response.json();
                if (result.success) {
                    currentMoney = result.money;
                    document.getElementById('display-money').innerText = currentMoney + " M";
                    
                    const minBet = Math.max(1, Math.floor(currentMoney * 0.05));
                    const maxBet = Math.max(1, Math.floor(currentMoney * 0.30));
                    document.getElementById('bet-range').innerText = `下限 ${minBet}M 〜 上限 ${maxBet}M`;
                    
                    const betInput = document.getElementById('bet-input');
                    betInput.min = minBet;
                    betInput.max = maxBet;
                }
            } catch (e) { console.error(e); }
        }

        async function playCoinToss() {
            const username = localStorage.getItem('mcci_username');
            const betInput = document.getElementById('bet-input');
            const bet = parseInt(betInput.value);
            const resultText = document.getElementById('result-text');
            const playBtn = document.getElementById('play-btn');
            const coin = document.getElementById('coin');

            if (isNaN(bet)) { alert("賭け金を数値で入力してください。"); return; }
            if (!selectedSide) { alert("表か裏を選択してください。"); return; }

            // 1. フロント側の入力枠制限チェック（※一応のガード）
            const minBet = Math.max(1, Math.floor(currentMoney * 0.05));
            const maxBet = Math.max(1, Math.floor(currentMoney * 0.30));
            if (bet < minBet || bet > maxBet) {
                alert(`賭け金は ${minBet}M から ${maxBet}M の間で指定してください。`);
                return;
            }

            // アニメーション開始（無限高速スピン）
            resultText.innerText = "コインが宙を舞っている... 🪙";
            resultText.style.color = "var(--text-main)";
            playBtn.disabled = true;
            coin.style.transition = "none"; // アニメーションリセット用
            coin.style.transform = "rotateY(0deg) rotateX(0deg)";
            coin.classList.add('spinning');

            // 🔴【先行して財布から引かれた額を画面に仮反映】
            // ボタンを押した瞬間、サーバー側ではすでに引き算が終わっています
            document.getElementById('display-money').innerText = (currentMoney - bet) + " M";

            try {
                const response = await fetch(`${BACKEND_URL}/api/games/cointoss`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, bet, choice: selectedSide })
                });
                const result = await response.json();

                // 2.5秒間スピンを見せてから結果ストップの演出（カジノのワクワク感）
                setTimeout(async () => {
                    coin.classList.remove('spinning');
                    coin.style.transition = "transform 1s cubic-bezier(0.175, 0.885, 0.32, 1.275)";

                    if (result.success) {
                        let sideHeader = "";
                        
                        // 結果の形状に合わせてコインをストップさせる
                        if (result.result === 'heads') {
                            coin.style.transform = "rotateY(0deg)"; // 表
                            sideHeader = "【🔵 表 / HEADS】";
                        } else if (result.result === 'tails') {
                            coin.style.transform = "rotateY(180deg)"; // 裏
                            sideHeader = "【🔴 裏 / TAILS】";
                        } else if (result.result === 'edge') {
                            coin.style.transform = "rotateY(90deg) rotateX(15deg)"; // 垂直に立つ（横から見える状態）
                            sideHeader = "【📐 直立 / STANDING】";
                        }

                        // メッセージと最終所持金の同期
                        resultText.innerText = `${sideHeader}\n${result.message}`;
                        resultText.style.color = result.win ? "var(--accent-main)" : "var(--alert-red)";
                        
                        // 最新の所持金を完全に同期
                        await updateStatus();
                        betInput.value = "";
                    } else {
                        alert(result.message);
                        resultText.innerText = "";
                        await updateStatus();
                    }
                    playBtn.disabled = false;
                }, 2500);

            } catch (error) {
                alert("通信エラーが発生しました。");
                resultText.innerText = "";
                coin.classList.remove('spinning');
                playBtn.disabled = false;
                await updateStatus();
            }
        }
    </script>
</body>
</html>
